# Nginx config for recorrido360.net
# Goes in /etc/nginx/sites-available/recorrido360
# Symlink to /etc/nginx/sites-enabled/ after running certbot.

server {
    listen 80;
    listen [::]:80;
    server_name recorrido360.net www.recorrido360.net;

    # certbot challenge passthrough
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Redirect everything else to HTTPS — certbot will edit this block.
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name recorrido360.net www.recorrido360.net;

    # SSL certs — populated by certbot --nginx
    # ssl_certificate /etc/letsencrypt/live/recorrido360.net/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/recorrido360.net/privkey.pem;
    # include /etc/letsencrypt/options-ssl-nginx.conf;
    # ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Security
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

    client_max_body_size 25M;

    # === Backend API on :8002 (no conflict with POS2GTO :8001) ===
    location /api/ {
        proxy_pass http://127.0.0.1:8002;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }

    # === Static frontend build ===
    root /opt/recorrido360/frontend/build;
    index index.html;

    # Long cache for hashed CRA assets
    location /static/ {
        expires 1y;
        add_header Cache-Control "public, immutable" always;
        try_files $uri =404;
    }
    location ~* \.(?:ico|css|js|gif|jpe?g|png|svg|webp|woff2?|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public" always;
        try_files $uri =404;
    }

    # SPA fallback — every other request returns index.html so React Router works
    location / {
        try_files $uri $uri/ /index.html;
    }
}
